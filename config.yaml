server:
  host: "0.0.0.0"
  port: 8090

cors:
  allowedOrigins:
    - "http://localhost:3000"
  allowedMethods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowedHeaders:
    - Content-Type
    - Authorization
    - Accept
    - Origin
    - X-Requested-With
    - Cache-Control
    - Pragma
  allowCredentials: true

dev: true

google:
  clientID: "your-google-client-id"
  clientSecret: "your-google-client-secret"