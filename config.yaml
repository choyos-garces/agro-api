server:
  host: "0.0.0.0"
  port: 8090

cors:
  allowedOrigins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allowedMethods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowedHeaders:
    - Content-Type
    - Authorization
  allowCredentials: true

cookie:
  name: "agro_session"
  secure: true
  httpOnly: true
  sameSite: "Strict"
  path: "/"

auth:
  cookieTTL: "24h"
  tokenSecret: "change-me-in-production"

dev: true